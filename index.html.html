<!DOCTYPE html>
<html>
<body style="background:#0b0e14; color:white; font-family:sans-serif; padding:50px;">
    <h1>Diagnosticando...</h1>
    <div id="error-log" style="color:#ff5252; font-weight:bold; margin-top:20px;"></div>
    <script>
        try {
            // Tentando rodar a função principal
            initGame();
            document.getElementById('error-log').innerText = "initGame() rodou sem erros.";
        } catch (err) {
            document.getElementById('error-log').innerText = "ERRO DETECTADO: " + err.message + " | Linha: " + err.stack;
        }
    </script>
</body>
</html>
