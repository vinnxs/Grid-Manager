<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Manager - Career Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --bg-main: #0b0e14; --bg-card: #121721; --primary: #00e676; --text: #f8f9fa; --text-muted: #707e94; --border: #222b3c; }
        body { background-color: var(--bg-main); color: var(--text); padding: 24px; font-family: 'Inter', sans-serif; }
        .container { max-width: 1280px; margin: 0 auto; }
        .card { background-color: var(--bg-card); padding: 24px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 24px; }
        .screen { display: none; } .screen.active { display: block; }
        button { background-color: var(--primary); color: #0b0e14; border: none; padding: 11px 16px; font-weight: 700; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div id="screen-select" class="screen active">
        <div class="card" style="text-align: center;">
            <h2><i class="fa-solid fa-briefcase"></i> Central de Contratos</h2>
            <p id="select-screen-desc" style="color: var(--text-muted); margin: 20px 0;">Carregando ofertas...</p>
            <div id="club-select-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;"></div>
        </div>
    </div>
    <div id="main-interface" style="display:none;">
        <h2 style="color:white;">Sistema carregado. Redirecionando...</h2>
    </div>
</div>

<script>
    let gameState = {
        userClub: "", money: 0, debt: 0, loanLimit: 0, week: 1, maxWeeks: 18,
        stats: { matches: 0, wins: 0, losses: 0 },
        clubs: [
            { id: "fla", name: "Flamengo", initBudget: 150000000, credit: 80000000, serie: "A", power: 85 },
            { id: "pal", name: "Palmeiras", initBudget: 130000000, credit: 70000000, serie: "A", power: 84 },
            { id: "gremio", name: "Grêmio", initBudget: 50000000, credit: 30000000, serie: "B", power: 76 },
            { id: "cru", name: "Cruzeiro", initBudget: 45000000, credit: 25000000, serie: "B", power: 76 },
            { id: "santos", name: "Santos", initBudget: 18000000, credit: 7000000, serie: "C", power: 70 },
            { id: "brusque", name: "Brusque", initBudget: 8000000, credit: 3000000, serie: "C", power: 63 }
        ],
        players: [], savedClubsSquads: {}, schedules: {}
    };

    function initGame() {
        try {
            console.log("Iniciando Jogo...");
            let list = document.getElementById('club-select-list');
            list.innerHTML = "";
            
            gameState.clubs.forEach(club => {
                let div = document.createElement('div');
                div.className = "card";
                div.innerHTML = `<h4>${club.name}</h4><p>Série ${club.serie}</p><button onclick="window.location.reload()">Carregando...</button>`;
                div.querySelector('button').onclick = () => {
                    gameState.userClub = club.id;
                    gameState.money = club.initBudget;
                    document.getElementById('screen-select').style.display = 'none';
                    document.getElementById('main-interface').style.display = 'block';
                    alert("Time selecionado! O sistema está ativo.");
                };
                list.appendChild(div);
            });
            document.getElementById('select-screen-desc').innerText = "Escolha um time para iniciar sua carreira:";
        } catch(e) {
            console.error("Erro na inicialização, resetando save:", e);
            localStorage.removeItem("grid_manager_save");
            window.location.reload();
        }
    }
    
    initGame();
</script>
</body>
</html>
