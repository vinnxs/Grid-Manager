<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Grid Manager - Full Pyramid Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --bg-main: #0b0e14; --bg-card: #121721; --primary: #00e676; --text: #f8f9fa; --border: #222b3c; }
        body { background-color: var(--bg-main); color: var(--text); font-family: sans-serif; padding: 24px; }
        .screen { display: none; } .screen.active { display: block; }
        .card { background-color: var(--bg-card); padding: 24px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 24px; }
        button { background-color: var(--primary); color: #0b0e14; border: none; padding: 12px 20px; font-weight: 700; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="screen-select" class="screen active">
    <div class="card">
        <h2>Escolha seu clube</h2>
        <div id="club-select-list"></div>
    </div>
</div>

<div id="main-interface" class="screen">
    <h2 id="display-title">Dashboard</h2>
    <button onclick="localStorage.clear(); location.reload()">Resetar Jogo</button>
</div>

<script>
    let gameState = {
        userClub: "",
        week: 1,
        maxWeeks: 10, // Corrigido para 10 rodadas
        clubs: [
            // Série A (6 times)
            { id: "c1", name: "Time A1", serie: "A", power: 80 }, { id: "c2", name: "Time A2", serie: "A", power: 79 },
            { id: "c3", name: "Time A3", serie: "A", power: 78 }, { id: "c4", name: "Time A4", serie: "A", power: 77 },
            { id: "c5", name: "Time A5", serie: "A", power: 76 }, { id: "c6", name: "Time A6", serie: "A", power: 75 },
            // Série B (6 times)
            { id: "c7", name: "Time B1", serie: "B", power: 70 }, { id: "c8", name: "Time B2", serie: "B", power: 69 },
            { id: "c9", name: "Time B3", serie: "B", power: 68 }, { id: "c10", name: "Time B4", serie: "B", power: 67 },
            { id: "c11", name: "Time B5", serie: "B", power: 66 }, { id: "c12", name: "Time B6", serie: "B", power: 65 },
            // Série C (6 times)
            { id: "c13", name: "Time C1", serie: "C", power: 60 }, { id: "c14", name: "Time C2", serie: "C", power: 59 },
            { id: "c15", name: "Time C3", serie: "C", power: 58 }, { id: "c16", name: "Time C4", serie: "C", power: 57 },
            { id: "c17", name: "Time C5", serie: "C", power: 56 }, { id: "c18", name: "Time C6", serie: "C", power: 55 }
        ],
        players: [], savedClubsSquads: {}, stats: { matches: 0, wins: 0, losses: 0 }
    };

    function initGame() {
        const list = document.getElementById('club-select-list');
        gameState.clubs.forEach(club => {
            let div = document.createElement('div');
            div.className = "card";
            div.innerHTML = `<h4>${club.name}</h4><p>Série ${club.serie} | Força: ${club.power}</p><button onclick="startCareer('${club.id}')">Assumir</button>`;
            list.appendChild(div);
        });
    }

    function startCareer(clubId) {
        gameState.userClub = clubId;
        document.getElementById('screen-select').classList.remove('active');
        document.getElementById('main-interface').classList.add('active');
        document.getElementById('display-title').innerText = "Gerenciando: " + gameState.clubs.find(c=>c.id==clubId).name;
    }

    window.onload = initGame;
</script>
</body>
</html>
