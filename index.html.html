<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Grid Manager - Série A Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --bg: #0b0e14; --primary: #00e676; --text: #fff; --card: #121721; --border: #222b3c; }
        body { background: var(--bg); color: var(--text); padding: 20px; font-family: sans-serif; }
        .screen { display: none; } .screen.active { display: block; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 20px; }
        #club-select-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        button { background: var(--primary); border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="screen-select" class="screen active">
    <div class="card">
        <h2>Escolha seu Clube da Série A</h2>
        <div id="club-select-list"></div>
    </div>
</div>

<div id="main-interface" class="screen">
    <div class="card">
        <h2 id="club-name-title">Dashboard</h2>
        <p id="week-display">Rodada: 1/10</p>
        <button onclick="simulateMatch()">Simular Rodada</button>
        <button onclick="location.reload()" style="background:#ff5252; color:white;">Sair do Clube</button>
    </div>
</div>

<script>
    let gameState = {
        userClub: "", week: 1, maxWeeks: 10,
        clubs: [
            { id: "a1", name: "Time A1", serie: "A", power: 80, budget: 100000000 },
            { id: "a2", name: "Time A2", serie: "A", power: 79, budget: 90000000 },
            { id: "a3", name: "Time A3", serie: "A", power: 78, budget: 80000000 },
            { id: "a4", name: "Time A4", serie: "A", power: 77, budget: 70000000 },
            { id: "a5", name: "Time A5", serie: "A", power: 76, budget: 60000000 },
            { id: "a6", name: "Time A6", serie: "A", power: 75, budget: 50000000 }
        ]
    };

    function initGame() {
        const list = document.getElementById('club-select-list');
        list.innerHTML = "";
        gameState.clubs.forEach(c => {
            let div = document.createElement('div');
            div.className = "card";
            div.innerHTML = `<h4>${c.name}</h4><p>Série ${c.serie} | OVR ${c.power}</p><button onclick="startCareer('${c.id}')">Assumir</button>`;
            list.appendChild(div);
        });
    }

    function startCareer(clubId) {
        gameState.userClub = clubId;
        document.getElementById('screen-select').classList.remove('active');
        document.getElementById('main-interface').classList.add('active');
        let club = gameState.clubs.find(c => c.id == clubId);
        document.getElementById('club-name-title').innerText = "Gerenciando: " + club.name;
    }

    function simulateMatch() {
        if(gameState.week < gameState.maxWeeks) {
            gameState.week++;
            document.getElementById('week-display').innerText = "Rodada: " + gameState.week + "/" + gameState.maxWeeks;
            alert("Partida simulada. Rodada: " + gameState.week);
        } else {
            alert("Temporada Encerrada!");
        }
    }

    window.onload = initGame;
</script>
</body>
</html>
