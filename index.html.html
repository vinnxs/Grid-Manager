<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Manager - Career & Evolution Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-main: #0b0e14;
            --bg-card: #121721;
            --bg-card-hover: #1a202c;
            --primary: #00e676;
            --primary-glow: rgba(0, 230, 118, 0.2);
            --text: #f8f9fa;
            --text-muted: #707e94;
            --danger: #ff5252;
            --warning: #ffd740;
            --info: #40c4ff;
            --border: #222b3c;
            --field-green: #1b5e20;
            --field-lines: rgba(255, 255, 255, 0.25);
            --bg-log: #161d2a;
            --bg-scoreboard: #070a0f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text); padding: 24px; }
        .container { max-width: 1280px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
        h1 { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; }
        h1 span { color: var(--primary); }
        .top-info { display: flex; gap: 20px; background: var(--bg-card); padding: 10px 24px; border-radius: 30px; border: 1px solid var(--border); font-size: 0.9rem; }
        .screen { display: none; } .screen.active { display: block; }
        .grid-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 24px; }
        button { background-color: var(--primary); color: #0b0e14; border: none; padding: 11px 16px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button.btn-nav { background-color: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); }
        button.btn-nav.active { background-color: var(--primary); border-color: var(--primary); color: #0b0e14; box-shadow: 0 4px 12px var(--primary-glow); }
        .card { background-color: var(--bg-card); padding: 24px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 24px; }
        .flex-dashboard { display: grid; grid-template-columns: 1.2fr 1fr; gap: 24px; }
        .tactic-layout-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 24px; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .live-scoreboard { background: var(--bg-scoreboard); border: 1px solid var(--border); border-radius: 10px; padding: 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .scoreboard-score { background: #1a2232; font-size: 1.8rem; font-weight: 900; padding: 4px 14px; border-radius: 6px; color: var(--primary); }
        .log-box { background: var(--bg-log); padding: 16px; height: 190px; overflow-y: auto; border-radius: 10px; border: 1px solid var(--border); }
        .football-field { background-color: var(--field-green); border: 3px solid var(--field-lines); border-radius: 12px; height: 480px; position: relative; }
        .field-player-card { position: absolute; background: rgba(18, 23, 33, 0.92); border: 1px solid var(--border); border-radius: 6px; padding: 4px; width: 90px; text-align: center; font-size: 0.7rem; color: var(--text); transform: translate(-50%, -50%); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Grid <span>Manager</span></h1>
        <div id="top-bar" class="top-info" style="display: none;">
            <span><i class="fa-solid fa-stadium"></i> <span id="user-club-name" style="font-weight: 700;"></span></span>
            <span><i class="fa-solid fa-wallet"></i> <span id="user-money" style="color: var(--primary); font-weight: 700;">-</span></span>
            <span><i class="fa-solid fa-calendar-days"></i> Rodada: <span id="current-week" style="font-weight: 700;">1</span>/18</span>
        </div>
    </header>

    <div id="screen-select" class="screen active">
        <div class="card" style="text-align: center; padding: 40px 20px;">
            <h2>Propostas de Emprego</h2>
            <div id="club-select-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; max-width: 800px; margin: 0 auto;"></div>
        </div>
    </div>

    <div id="main-interface" style="display: none;">
        <div class="grid-menu">
            <button class="btn-nav active" id="btn-tab-dashboard" onclick="switchScreen('dashboard')">Dashboard</button>
            <button class="btn-nav" id="btn-tab-taticas" onclick="switchScreen('taticas')">Táticas</button>
            <button class="btn-nav" id="btn-tab-elenco" onclick="switchScreen('elenco')">Elenco</button>
            <button class="btn-nav" id="btn-tab-classificacoes" onclick="switchScreen('classificacoes')">Tabela</button>
            <button onclick="saveGame()">Salvar</button>
        </div>

        <div id="screen-dashboard" class="screen active">
            <div class="flex-dashboard">
                <div>
                    <div class="live-scoreboard">
                        <div id="score-home-name">-</div>
                        <div class="scoreboard-score" id="score-home-goals">0</div>
                        <div class="scoreboard-score" id="score-away-goals">0</div>
                        <div id="score-away-name">-</div>
                    </div>
                    <button id="btn-play" onclick="simulateMatchDay()">Iniciar Partida</button>
                    <div id="match-live-log" class="log-box">Aguardando...</div>
                </div>
                <div class="football-field" id="dash-field-players"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let gameState = {
        userClub: "", money: 0, week: 1, maxWeeks: 18, 
        clubs: [
            { id: "cfc", name: "Coritiba", pts: 0, v: 0, e: 0, d: 0, sg: 0, power: 76, initBudget: 35000000 },
            { id: "fla", name: "Flamengo", pts: 0, v: 0, e: 0, d: 0, sg: 0, power: 85, initBudget: 150000000 },
            { id: "pal", name: "Palmeiras", pts: 0, v: 0, e: 0, d: 0, sg: 0, power: 84, initBudget: 130000000 },
            { id: "bot", name: "Botafogo", pts: 0, v: 0, e: 0, d: 0, sg: 0, power: 82, initBudget: 95000000 },
            { id: "sao", name: "São Paulo", pts: 0, v: 0, e: 0, d: 0, sg: 0, power: 80, initBudget: 60000000 },
            { id: "gremio", name: "Grêmio", pts: 0, v: 0, e: 0, d: 0, sg: 0, power: 78, initBudget: 50000000 },
            { id: "cru", name: "Cruzeiro", pts: 0, v: 0, e: 0, d: 0, sg: 0, power: 76, initBudget: 45000000 },
            { id: "vasco", name: "Vasco", pts: 0, v: 0, e: 0, d: 0, sg: 0, power: 76, initBudget: 40000000 },
            { id: "int", name: "Internacional", pts: 0, v: 0, e: 0, d: 0, sg: 0, power: 75, initBudget: 38000000 },
            { id: "atl", name: "Atlético-MG", pts: 0, v: 0, e: 0, d: 0, sg: 0, power: 79, initBudget: 55000000 }
        ],
        players: [], schedule: [], stats: { matches: 0, wins: 0, losses: 0 }
    };

    function initGame() {
        let selectHtml = "";
        gameState.clubs.forEach(club => {
            selectHtml += `<div class="card"><h3>${club.name}</h3><button onclick="selectClub('${club.id}')">Assinar</button></div>`;
        });
        document.getElementById('club-select-list').innerHTML = selectHtml;
        gameState.schedule = generateLeagueSchedule(gameState.clubs);
    }

    function generateLeagueSchedule(teamList) {
        let list = [...teamList]; let numTeams = list.length; let rounds = numTeams - 1; let turnMatches = [];
        for (let r = 0; r < rounds; r++) {
            let roundFixtures = [];
            for (let i = 0; i < numTeams / 2; i++) { roundFixtures.push({ home: list[i].id, away: list[numTeams - 1 - i].id }); }
            turnMatches.push(roundFixtures); list.splice(1, 0, list.pop());
        }
        let returnMatches = turnMatches.map(round => round.map(m => ({ home: m.away, away: m.home })));
        return [...turnMatches, ...returnMatches];
    }

    function selectClub(clubId) {
        gameState.userClub = clubId;
        document.getElementById('screen-select').style.display = 'none';
        document.getElementById('main-interface').style.display = 'block';
        document.getElementById('top-bar').style.display = 'flex';
        document.getElementById('user-club-name').innerText = gameState.clubs.find(c => c.id === clubId).name;
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
    }

    function saveGame() { localStorage.setItem("grid_manager_save", JSON.stringify(gameState)); alert("Jogo salvo!"); }
    
    function simulateMatchDay() {
        if(gameState.week >= gameState.maxWeeks) { alert("Temporada finalizada!"); return; }
        alert("Simulando rodada " + gameState.week);
        gameState.week++;
        document.getElementById('current-week').innerText = gameState.week;
    }

    initGame();
</script>
</body>
</html>
