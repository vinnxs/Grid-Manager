<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Grid Manager - Versão Estável</title>
    <style>
        :root { --bg: #0b0e14; --primary: #00e676; --text: #fff; --border: #222b3c; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .screen { display: none; } .screen.active { display: block; }
        .card { background: #121721; padding: 20px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 20px; }
        button { background: var(--primary); border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="screen-select" class="screen active">
    <div class="card">
        <h2>Escolha seu time</h2>
        <div id="club-list"></div>
    </div>
</div>

<div id="screen-main" class="screen">
    <div class="card">
        <h2 id="club-display">Time: ...</h2>
        <p id="money-display">Caixa: R$ 0</p>
        <button onclick="location.reload()" style="background:#ff5252;">Sair do Clube</button>
    </div>
</div>

<script>
    const clubs = [
        { id: 1, name: "Flamengo", budget: 150000000 },
        { id: 2, name: "Palmeiras", budget: 130000000 },
        { id: 3, name: "Coritiba", budget: 35000000 }
    ];

    function init() {
        const list = document.getElementById('club-list');
        clubs.forEach(c => {
            let btn = document.createElement('button');
            btn.innerText = c.name;
            btn.style.margin = "5px";
            btn.onclick = () => selectClub(c);
            list.appendChild(btn);
        });
    }

    function selectClub(club) {
        document.getElementById('screen-select').classList.remove('active');
        document.getElementById('screen-main').classList.add('active');
        
        document.getElementById('club-display').innerText = "Gerenciando: " + club.name;
        document.getElementById('money-display').innerText = "Caixa: " + club.budget.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
    }

    init();
</script>
</body>
</html>
