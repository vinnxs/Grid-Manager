<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Grid Manager - Career Mode</title>
    <style>
        :root { --bg-main: #0b0e14; --bg-card: #121721; --primary: #00e676; --text: #f8f9fa; }
        body { background-color: var(--bg-main); color: var(--text); padding: 24px; font-family: 'Inter', sans-serif; }
        .screen { display: none; } .screen.active { display: block; }
        .card { background-color: var(--bg-card); padding: 24px; border-radius: 12px; border: 1px solid #222b3c; }
        button { background-color: var(--primary); color: #0b0e14; border: none; padding: 11px 16px; font-weight: 700; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<!-- TELA DE SELEÇÃO -->
<div id="screen-select" class="screen active">
    <div class="card" style="text-align: center;">
        <h2>Central de Contratos</h2>
        <div id="club-select-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px;"></div>
    </div>
</div>

<!-- TELA DO DASHBOARD (O QUE DEVE APARECER) -->
<div id="screen-dashboard" class="screen">
    <div class="card">
        <h2 id="display-club-name">Bem-vindo ao Clube</h2>
        <p>Dashboard do seu time carregado com sucesso!</p>
        <button onclick="location.reload()">Sair do Clube</button>
    </div>
</div>

<script>
    let gameState = { userClub: "", clubs: [ {id: "fla", name: "Flamengo"}, {id: "cfc", name: "Coritiba"} ] };

    function initGame() {
        let list = document.getElementById('club-select-list');
        gameState.clubs.forEach(club => {
            let btn = document.createElement('button');
            btn.innerText = "Assumir " + club.name;
            btn.onclick = () => startCareer(club.id);
            list.appendChild(btn);
        });
    }

    function startCareer(clubId) {
        gameState.userClub = clubId;
        
        // Esconde seleção e MOSTRA o Dashboard
        document.getElementById('screen-select').classList.remove('active');
        document.getElementById('screen-dashboard').classList.add('active');
        
        // Atualiza conteúdo do dashboard
        let club = gameState.clubs.find(c => c.id === clubId);
        document.getElementById('display-club-name').innerText = "Gerenciando: " + club.name;
        
        console.log("Dashboard carregado para:", clubId);
    }

    initGame();
</script>
</body>
</html>
